---
# EDIN Backend — Control API, Discord bot, galaxy exporter, Redis

- name: EDIN backend deployment
  hosts: edin
  become: true

  vars_files:
    - group_vars/creds.yml

  roles:
    - role: redis
      tags: [redis]
    - role: control_api
      tags: [control_api]
    - role: discord_bot
      tags: [discord_bot]
    - role: galaxy_exporter
      tags: [galaxy_exporter]
