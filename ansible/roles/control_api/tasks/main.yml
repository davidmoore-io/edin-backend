---
# Control API — REST + MCP server for EDIN platform

- name: Ensure control API directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: '0755'
  loop:
    - { path: "{{ control_api_dir }}" }
    - { path: "{{ control_api_src_dir | dirname }}", owner: "{{ ansible_user }}", group: "{{ ansible_user }}" }
  tags: [control_api, directories]

- name: Ensure edin-app Docker network exists
  community.docker.docker_network:
    name: "{{ edin_app_network }}"
    state: present
  tags: [control_api, network]

# Git clone (must run as connecting user for SSH deploy key)
- name: Check if backend repo exists
  ansible.builtin.stat:
    path: "{{ control_api_src_dir }}/.git"
  register: backend_repo_state
  become: false
  tags: [control_api, source]

- name: Clone backend repo
  ansible.builtin.command:
    cmd: "git clone --branch {{ control_api_repo_branch }} {{ control_api_repo_url }} {{ control_api_src_dir }}"
    creates: "{{ control_api_src_dir }}/.git"
  become: false
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  when: not backend_repo_state.stat.exists
  tags: [control_api, source]

- name: Pull latest backend code
  ansible.builtin.command:
    cmd: "git pull origin {{ control_api_repo_branch }}"
    chdir: "{{ control_api_src_dir }}"
  become: false
  environment:
    GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=accept-new"
  when: backend_repo_state.stat.exists
  register: git_pull
  changed_when: "'Already up to date' not in git_pull.stdout"
  tags: [control_api, source]

# Environment and compose
- name: Template control API environment file
  ansible.builtin.template:
    src: control-api.env.j2
    dest: "{{ control_api_env_file }}"
    owner: root
    group: root
    mode: '0600'
  notify: Restart control API
  tags: [control_api, config]

- name: Template control API compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ control_api_compose_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart control API
  tags: [control_api, compose]

# Build and start
- name: Build and start control API
  ansible.builtin.command:
    cmd: "docker compose -f {{ control_api_compose_file }} up -d --build --remove-orphans"
  register: api_up
  changed_when: "'Started' in api_up.stderr or 'Built' in api_up.stderr or 'Created' in api_up.stderr"
  tags: [control_api, deploy]

- name: Wait for control API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/health"
    method: GET
    status_code: [200]
  register: api_health
  retries: 10
  delay: 5
  until: api_health is not failed
  failed_when: false
  tags: [control_api, verify]
