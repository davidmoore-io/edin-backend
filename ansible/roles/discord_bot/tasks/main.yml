---
# Discord Bot — slash commands + LLM chat via Control API

- name: Ensure Discord bot directory exists
  ansible.builtin.file:
    path: "{{ discord_bot_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [discord_bot, directories]

- name: Template Discord bot environment file
  ansible.builtin.template:
    src: discord-bot.env.j2
    dest: "{{ discord_bot_env_file }}"
    owner: root
    group: root
    mode: '0600'
  notify: Restart Discord bot
  tags: [discord_bot, config]

- name: Template Discord bot compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ discord_bot_compose_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Discord bot
  tags: [discord_bot, compose]

- name: Build and start Discord bot
  ansible.builtin.command:
    cmd: "docker compose -f {{ discord_bot_compose_file }} up -d --build --remove-orphans"
  register: bot_up
  changed_when: "'Started' in bot_up.stderr or 'Built' in bot_up.stderr or 'Created' in bot_up.stderr"
  tags: [discord_bot, deploy]
