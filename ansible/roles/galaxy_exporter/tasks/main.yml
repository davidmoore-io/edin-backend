---
# Galaxy Exporter — generates binary galaxy map data on a timer

- name: Ensure galaxy output directory exists
  ansible.builtin.file:
    path: "{{ galaxy_exporter_output_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [galaxy_exporter, directories]

- name: Cross-compile galaxy exporter binary (macOS → linux/amd64)
  ansible.builtin.command:
    cmd: "go build -o /tmp/galaxy-exporter-linux ./cmd/galaxy-exporter"
    chdir: "{{ playbook_dir }}/../../"
  environment:
    CGO_ENABLED: "0"
    GOOS: linux
    GOARCH: amd64
  delegate_to: localhost
  become: false
  register: build_result
  changed_when: build_result.rc == 0
  tags: [galaxy_exporter, build]

- name: Copy galaxy exporter binary to server
  ansible.builtin.copy:
    src: /tmp/galaxy-exporter-linux
    dest: "{{ galaxy_exporter_binary_path }}"
    owner: root
    group: root
    mode: '0755'
  notify: Restart galaxy exporter timer
  tags: [galaxy_exporter, deploy]

- name: Template galaxy exporter systemd service
  ansible.builtin.template:
    src: galaxy-exporter.service.j2
    dest: /etc/systemd/system/galaxy-exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart galaxy exporter timer
  tags: [galaxy_exporter, service]

- name: Template galaxy exporter systemd timer
  ansible.builtin.template:
    src: galaxy-exporter.timer.j2
    dest: /etc/systemd/system/galaxy-exporter.timer
    owner: root
    group: root
    mode: '0644'
  notify: Restart galaxy exporter timer
  tags: [galaxy_exporter, service]

- name: Enable and start galaxy exporter timer
  ansible.builtin.systemd:
    name: galaxy-exporter.timer
    state: started
    enabled: true
    daemon_reload: true
  tags: [galaxy_exporter, service]
