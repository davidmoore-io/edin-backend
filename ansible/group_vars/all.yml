---
# EDIN Backend Configuration
# ===========================

# Source repo (cloned on server for Docker builds)
control_api_repo_url: "git@github.com:davidmoore-io/edin-backend.git"
control_api_repo_branch: main
control_api_src_dir: /srv/edin-backend/src

# Control API
control_api_dir: /srv/control-api
control_api_env_file: /srv/control-api/control-api.env
control_api_compose_file: /srv/control-api/docker-compose.yml

# Discord Bot
discord_bot_dir: /srv/discord-bot
discord_bot_env_file: /srv/discord-bot/discord-bot.env
discord_bot_compose_file: /srv/discord-bot/docker-compose.yml
discord_app_id: "1438245266817028169"

# Galaxy Exporter
galaxy_exporter_output_dir: /srv/galaxy
galaxy_exporter_binary_path: /usr/local/bin/galaxy-exporter
galaxy_exporter_timer_interval: 15min
galaxy_exporter_batch_size: 50000
galaxy_exporter_history_cycles: 12

# Database connections (Docker network hostnames — no VPN needed)
memgraph_host: memgraph
memgraph_port: 7687
edin_db_host: edin-timescaledb
edin_db_port: 5432
eddn_db_host: eddn-timescaledb
eddn_db_port: 5432

# VPN address (galaxy exporter runs on host, needs VPN-bound ports)
vpn_interface_address: "10.8.0.6"

# Docker networks
edin_app_network: edin-app-net
edin_data_network: edin-data-net

# Redis
redis_image: redis:7-alpine
redis_port: 6379

# Kaine auth (Authentik on edin.space)
kaine_auth_enabled: "true"
kaine_auth_jwks_url: "https://auth.edin.space/application/o/kaine-portal/jwks/"
kaine_auth_issuer: "https://auth.edin.space/application/o/kaine-portal/"
kaine_auth_audience: "kaine-portal"

# Domain
edin_domain: edin.space
